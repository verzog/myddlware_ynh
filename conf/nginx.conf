# Redirect the bare path (no trailing slash) to the canonical "__PATH__/".
# Written as a regex so it is a harmless no-op for root installs, where
# __PATH__ is empty and "^$" never matches a request URI.
location ~ ^__PATH__$ {
    return 301 __PATH__/;
}

location __PATH__/ {
    alias __INSTALL_DIR__/public/;

    try_files $uri @__APP__;

    location ~ [^/]\.php(/|$) {
        fastcgi_pass unix:/var/run/php/php__PHPVERSION__-fpm-__APP__.sock;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $request_filename;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 8 16k;
        fastcgi_read_timeout 300;
    }
}

location @__APP__ {
    fastcgi_pass unix:/var/run/php/php__PHPVERSION__-fpm-__APP__.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME __INSTALL_DIR__/public/index.php;
    fastcgi_param SCRIPT_NAME __PATH__/index.php;
    fastcgi_param REQUEST_URI $request_uri;
    fastcgi_read_timeout 300;
}
